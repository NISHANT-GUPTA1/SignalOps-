# Slack app manifest for the AI Bug Triage agent.
# Create the app fast: https://api.slack.com/apps → "Create New App" → "From a manifest"
# → paste this. Then:
#   1) Basic Information → App-Level Tokens → Generate a token with scope
#      `connections:write`  → copy the xapp-... into SLACK_APP_TOKEN.
#   2) Install App → copy the Bot User OAuth Token (xoxb-...) into SLACK_BOT_TOKEN.
#   3) `python run_slack.py`
display_information:
  name: AI Bug Triage
  description: Turn messy bug reports into clean, prioritized, de-duplicated issues — inside Slack.
  background_color: "#1a1440"
  long_description: >-
    AI Bug Triage is an agentic-RAG assistant that lives in Slack. Paste any messy
    bug report — a vague message, a half-written email, a form dump — and it returns
    a clean, prioritized (P0–P3 with a reason), de-duplicated engineering issue with
    reproduction steps, grounded in your team's real issue history via hybrid
    semantic + keyword search. One click files it to GitHub or Plane. It also drafts
    release notes from resolved issues.

features:
  bot_user:
    display_name: BugTriage
    always_online: true
  # Native AI agent panel (Agents & AI Apps).
  assistant_view:
    assistant_description: Triage messy bug reports into clean, prioritized issues.
    suggested_prompts:
      - title: Triage a report
        message: Login button 500s on mobile Safari after the last deploy
  slash_commands:
    - command: /triage
      description: Triage a messy bug report into a clean, prioritized issue
      usage_hint: "<paste the report>  (optionally end with repo:owner/name)"
      should_escape: false
    - command: /release-notes
      description: Draft release notes from resolved issues
      usage_hint: "owner/name"
      should_escape: false
  shortcuts:
    - name: Triage this
      type: message
      callback_id: triage_message
      description: Triage this message into a clean, prioritized issue

oauth_config:
  scopes:
    bot:
      - commands             # slash commands
      - app_mentions:read    # @mentions
      - chat:write           # post triage cards
      - chat:write.public    # post in channels the bot isn't a member of
      - reactions:write      # :hourglass: while triaging
      - assistant:write      # native AI assistant panel
      - im:history           # assistant DMs
      - im:read
      - im:write
      - channels:history     # read a message to triage (public)
      - channels:read
      - groups:history       # private channels
      - groups:read
      - users:read           # resolve reporter names

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - assistant_thread_started
      - assistant_thread_context_changed
      - message.im
  interactivity:
    is_enabled: true
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
